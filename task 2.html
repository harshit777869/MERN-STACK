<!DOCTYPE html>
<html>
<head>
<title>Task 2 - Weather</title>
<style>
body{text-align:center;font-family:Arial;background:#e3f2fd;}
.box{background:white;width:300px;margin:auto;margin-top:50px;padding:20px;}
</style>
</head>

<body>

<div class="box">
<h2>Weather App</h2>

<input id="city" placeholder="Enter city">
<button onclick="getWeather()">Search</button>

<p id="out"></p>
</div>

<script>
async function getWeather(){
let city=document.getElementById("city").value;

let res = await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=28&longitude=77&current_weather=true`
);

let data = await res.json();

document.getElementById("out").innerText =
"Temperature: " + data.current_weather.temperature + "°C";
}
</script>

</body>
</html>
