<!DOCTYPE html>
<html>
<head>
<title>Task 4 - Productivity Tracker</title>
<style>
body{text-align:center;font-family:Arial;background:#f5f5f5;}
.box{background:white;width:300px;margin:auto;margin-top:50px;padding:20px;}
</style>
</head>

<body>

<div class="box">
<h2>Productivity Tracker</h2>

<p id="time">Time Spent: 0 sec</p>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>
</div>

<script>
let t=0;
let timer;

function start(){
timer=setInterval(()=>{
t++;
document.getElementById("time").innerText="Time Spent: "+t+" sec";
},1000);
}

function stop(){
clearInterval(timer);
}
</script>

</body>
</html>
